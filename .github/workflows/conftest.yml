name: OPA Conftest

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  conftest:
    name: Policy checks
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Install Conftest
        env:
          CONFTEST_VERSION: "0.56.0"
        run: |
          curl -sSL \
            "https://github.com/open-policy-agent/conftest/releases/download/v${CONFTEST_VERSION}/conftest_${CONFTEST_VERSION}_Linux_x86_64.tar.gz" \
            -o /tmp/conftest.tar.gz
          tar -xzf /tmp/conftest.tar.gz -C /tmp conftest
          sudo mv /tmp/conftest /usr/local/bin/conftest
          conftest --version

      - name: Run Terraform policies
        run: |
          find envs modules \( -name "*.tf" -o -name "*.tfvars" \) -print0 \
            | xargs -0 conftest test --parser hcl2 --policy policies/conftest/terraform --all-namespaces
