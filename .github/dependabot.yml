version: 2
updates:
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
  - package-ecosystem: terraform
    directory: /envs/dev
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
  - package-ecosystem: terraform
    directory: /envs/staging
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
  - package-ecosystem: terraform
    directory: /envs/prod
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
