apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: {{ .Values.rootApp.name | quote }}
  namespace: {{ .Values.rootApp.namespace | quote }}
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: {{ .Values.rootApp.repoURL | quote }}
    targetRevision: {{ .Values.rootApp.targetRevision | quote }}
    path: {{ .Values.rootApp.path | quote }}
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
